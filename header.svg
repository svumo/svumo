<svg xmlns="http://www.w3.org/2000/svg" width="460" height="120" viewBox="0 0 460 120" role="img" aria-label="danielpd">
  <style>
    @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
    @keyframes load { 0% { stroke-dashoffset: 240 } 100% { stroke-dashoffset: -240 } }
    .name {
      font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;
      font-size: 56px; font-weight: 700; fill: #14b8a6;
      animation: fade 1.4s ease-out both;
    }
    .track { stroke: #14b8a6; stroke-opacity: 0.16; stroke-width: 3; }
    .bar {
      stroke: #14b8a6; stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 60 360;
      animation: load 2.2s linear infinite, fade 1.2s ease-out both;
    }
  </style>
  <text x="230" y="62" text-anchor="middle" class="name">danielpd</text>
  <line x1="115" y1="88" x2="345" y2="88" class="track"/>
  <line x1="115" y1="88" x2="345" y2="88" class="bar"/>
</svg>
