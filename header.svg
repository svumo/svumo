<svg xmlns="http://www.w3.org/2000/svg" width="760" height="200" viewBox="0 0 760 200" role="img" aria-label="danielpd">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d0d"/>
      <stop offset="1" stop-color="#0a130d"/>
    </linearGradient>
  </defs>
  <style>
    .mono { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace; }
    .name { fill: #14b8a6; font-size: 62px; font-weight: 700; letter-spacing: 2px; }
    .sub  { fill: #c9d1d9; font-size: 17px; letter-spacing: 4px; }
    @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
    .fade { animation: fade 1.1s ease-out both; }
  </style>
  <rect width="760" height="200" fill="url(#bg)"/>
  <g class="mono fade" text-anchor="middle">
    <text x="380" y="98" class="name">danielpd</text>
    <text x="380" y="138" class="sub">cybersecurity &amp; engineering</text>
  </g>
  <rect x="290" y="158" width="180" height="2" rx="1" fill="#14b8a6" opacity="0.55"/>
</svg>
