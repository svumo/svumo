name: Isocalendar

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "isocalendar.svg"
      - "metrics.svg"

permissions:
  contents: write

jobs:
  isocalendar:
    runs-on: ubuntu-latest
    steps:
      - name: Generate 3D isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: svumo
          filename: isocalendar.svg
          base: ""
          config_timezone: Europe/London
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: >
            body { background: #0d0d0d !important; }
            svg { background: #0d0d0d !important; }
            text, tspan { fill: #c9d1d9 !important; }
            .title, h2, .calendar-title { fill: #14b8a6 !important; color: #14b8a6 !important; }
