name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "metrics.svg"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: svumo
          filename: metrics.svg
          template: classic
          base: "header, activity, community, repositories, metadata"
          config_timezone: Europe/London
          config_order: "base.header, base.activity, base.community, base.repositories, isocalendar, languages"
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          extras_css: >
            body { background: #0d0d0d !important; }
            svg { background: #0d0d0d !important; }
            text, tspan, .field, .row, .gauge text, tspan.value { fill: #c9d1d9 !important; color: #c9d1d9 !important; }
            h2, .title, .key, a, .calendar-graph text { fill: #00ff41 !important; color: #00ff41 !important; }
            rect.day[fill="#ebedf0"] { fill: #161b22 !important; }
            .holes ellipse { stroke: #0d0d0d !important; }
